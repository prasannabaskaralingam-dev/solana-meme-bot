services:
  - type: worker
    name: solana-meme-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python trading_bot.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: PERSISTENT_DATA_DIR
        value: /var/data/solana-bot
    disk:
      name: solana-bot-data
      mountPath: /var/data/solana-bot
      sizeGB: 1
